<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASAKAWA Field Pack</title>
  <meta name="description" content="Faultier Commons prototype: a landscape-based field pack for the Asakawa river." />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</head>
<body>
  <main class="prototype-board" aria-label="ASAKAWA Field Pack prototype screens">
    <section class="screen-block">
      <h2 class="screen-label">HOME</h2>
      <div class="phone" id="screen-home"></div>
    </section>

    <section class="screen-block">
      <h2 class="screen-label">Sound</h2>
      <div class="phone dark-phone" id="screen-sound"></div>
    </section>

    <section class="screen-block">
      <h2 class="screen-label">Sound-Info</h2>
      <div class="phone dark-phone" id="screen-info"></div>
    </section>

    <section class="screen-block">
      <h2 class="screen-label">LIST</h2>
      <div class="phone" id="screen-list"></div>
    </section>

    <section class="screen-block">
      <h2 class="screen-label">Mapping</h2>
      <div class="phone map-phone" id="screen-map"></div>
    </section>

    <section class="screen-block">
      <h2 class="screen-label">Mapping</h2>
      <div class="phone map-phone" id="screen-map-sheet"></div>
    </section>
  </main>
</body>
</html>
